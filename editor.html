<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iBld · Editor</title>
    <link rel="icon" href="assets/icons/ibld-logo.png" type="image/png" />
    <link rel="stylesheet" href="src/css/style.css" />
    <style>
        /* ─── EDITOR LAYOUT ─────────────────────────────── */
        .editor-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 80px);
            padding: 16px 24px;
            gap: 12px;
        }

        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .editor-toolbar .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .editor-toolbar .project-title {
            font-size: 18px;
            font-weight: 600;
        }

        .editor-toolbar .project-title .repo {
            color: #888;
            font-weight: 400;
            font-size: 14px;
        }

        .editor-toolbar .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        #editor-container {
            flex: 1;
            min-height: 400px;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            background: #1a1a1a;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: #111;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            color: #666;
            font-size: 13px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .status-bar .saved {
            color: #00ccff;
        }
        .status-bar .unsaved {
            color: #ffcc00;
        }

        /* ─── RESPONSIVE ──────────────────────────────────── */
        @media (max-width: 700px) {
            .editor-container {
                height: calc(100vh - 120px);
                padding: 12px;
            }
            .editor-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .editor-toolbar .left {
                flex-wrap: wrap;
            }
            .editor-toolbar .actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- ─── HEADER ─────────────────────────────────────────────── -->
    <header>
        <div class="logo-area">
            <img src="assets/icons/ibld-logo.png" alt="iBld Logo" class="logo-icon" />
            <span class="logo-text">iBuild <span class="light">Web</span></span>
        </div>
        <div class="header-actions">
            <span id="userDisplay" class="user-badge"></span>
            <button id="backBtn" class="btn-secondary">← Dashboard</button>
            <button id="logoutBtn" class="btn-secondary">Logout</button>
        </div>
    </header>

    <!-- ─── EDITOR ────────────────────────────────────────────────── -->
    <div class="editor-container">
        <div class="editor-toolbar">
            <div class="left">
                <span class="project-title">
                    <span id="projectName">Project</span>
                    <span class="repo" id="repoName">repo</span>
                </span>
                <span id="saveStatus" class="saved">✅ Saved</span>
            </div>
            <div class="actions">
                <button id="saveBtn" class="btn-primary">💾 Save</button>
                <button id="buildBtn" class="btn-secondary">🔨 Build</button>
                <button id="downloadBtn" class="btn-secondary">📦 IPA</button>
            </div>
        </div>

        <div id="editor-container"></div>

        <div class="status-bar">
            <span id="statusLeft">📄 main.swift</span>
            <span id="statusRight">🐱 iBuild Web</span>
        </div>
    </div>

    <!-- ─── SCRIPTS ────────────────────────────────────────────────── -->
    <script src="src/js/monaco-loader.js"></script>
    <script src="src/js/build.js"></script>
    <script>
        // ─── CONFIG ──────────────────────────────────────────────
        const REPO = new URLSearchParams(window.location.search).get('repo');
        if (!REPO) {
            document.body.innerHTML = '<div style="text-align:center;padding:80px;color:#888;"><h2>No project selected</h2><p><a href="index.html">← Back to Dashboard</a></p></div>';
            throw new Error('No repo specified');
        }

        document.getElementById('repoName').textContent = REPO;
        document.getElementById('projectName').textContent = REPO.replace('ibuild-', '');

        // ─── STATE ──────────────────────────────────────────────
        let editor = null;
        let currentContent = '';
        let isDirty = false;
        let currentToken = null;
        let currentOwner = null;

        // ─── INIT ──────────────────────────────────────────────────
        async function init() {
            const token = localStorage.getItem('github_token');
            if (!token) {
                document.body.innerHTML = '<div style="text-align:center;padding:80px;color:#888;"><h2>Not logged in</h2><p><a href="index.html">← Back to Dashboard</a></p></div>';
                return;
            }
            currentToken = token;

            try {
                const user = await getUserInfo(token);
                currentOwner = user.login;
                document.getElementById('userDisplay').textContent = '🐱 ' + user.login;

                await loadFile();
                await initEditor();

            } catch (err) {
                console.error('Init error:', err);
                document.getElementById('editor-container').innerHTML = '<div style="padding:40px;text-align:center;color:#888;">❌ Failed to load: ' + err.message + '</div>';
            }
        }

        // ─── GET USER INFO ──────────────────────────────────────
        async function getUserInfo(token) {
            const res = await fetch('https://api.github.com/user', {
                headers: { 'Authorization': `token ${token}` }
            });
            if (!res.ok) throw new Error('Failed to get user info');
            return res.json();
        }

        // ─── LOAD FILE ──────────────────────────────────────────
        async function loadFile() {
            const path = 'Sources/main.swift';
            try {
                const res = await fetch(`https://api.github.com/repos/${currentOwner}/${REPO}/contents/${path}`, {
                    headers: { 'Authorization': `token ${currentToken}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    currentContent = atob(data.content.replace(/\n/g, ''));
                } else if (res.status === 404) {
                    currentContent = '// No main.swift found\n';
                } else {
                    throw new Error('Failed to fetch file');
                }
            } catch (err) {
                console.error('Load file error:', err);
                currentContent = '// Error loading file\n';
            }
        }

        // ─── INIT EDITOR ──────────────────────────────────────────
        async function initEditor() {
            try {
                await MonacoLoader.load();

                editor = MonacoLoader.createEditor('editor-container', {
                    value: currentContent,
                });

                // Detect changes
                editor.onDidChangeModelContent(() => {
                    isDirty = true;
                    document.getElementById('saveStatus').textContent = '⚠️ Unsaved';
                    document.getElementById('saveStatus').className = 'unsaved';
                });

                // Ctrl+S to save
                editor.addCommand(window.monaco.KeyMod.CtrlCmd | window.monaco.KeyCode.KeyS, () => {
                    saveFile();
                });

                // ─── EVENT BINDINGS ──────────────────────────────
                document.getElementById('saveBtn').addEventListener('click', saveFile);

                document.getElementById('buildBtn').addEventListener('click', () => {
                    if (typeof window._buildProject === 'function') {
                        window._buildProject(REPO);
                    } else {
                        showToast('⚠️ Build function not loaded', true);
                    }
                });

                document.getElementById('downloadBtn').addEventListener('click', () => {
                    if (typeof window._downloadIPA === 'function') {
                        window._downloadIPA(REPO);
                    } else {
                        showToast('⚠️ Download function not loaded', true);
                    }
                });

                document.getElementById('backBtn').addEventListener('click', () => {
                    if (isDirty && !confirm('You have unsaved changes. Go back anyway?')) return;
                    window.location.href = 'index.html';
                });

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    localStorage.removeItem('github_token');
                    window.location.href = 'index.html';
                });

            } catch (err) {
                console.error('Editor init error:', err);
                document.getElementById('editor-container').innerHTML = '<div style="padding:40px;text-align:center;color:#888;">❌ Failed to load editor: ' + err.message + '</div>';
            }
        }

        // ─── SAVE FILE ──────────────────────────────────────────
        async function saveFile() {
            if (!editor) return;
            const content = editor.getValue();
            const path = 'Sources/main.swift';

            try {
                // Get current file SHA (for update)
                let sha = '';
                const checkRes = await fetch(`https://api.github.com/repos/${currentOwner}/${REPO}/contents/${path}`, {
                    headers: { 'Authorization': `token ${currentToken}` }
                });
                if (checkRes.ok) {
                    const data = await checkRes.json();
                    sha = data.sha;
                }

                const encoded = btoa(unescape(encodeURIComponent(content)));

                const res = await fetch(`https://api.github.com/repos/${currentOwner}/${REPO}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${currentToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: 'Update main.swift from iBuild Web',
                        content: encoded,
                        sha: sha || undefined,
                        branch: 'main',
                    }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || 'Save failed');
                }

                isDirty = false;
                document.getElementById('saveStatus').textContent = '✅ Saved';
                document.getElementById('saveStatus').className = 'saved';
                showToast('💾 Saved successfully!');

            } catch (err) {
                console.error('Save error:', err);
                showToast('❌ Save failed: ' + err.message, true);
            }
        }

        // ─── TOAST ──────────────────────────────────────────────────
        function showToast(msg, isWarning = false) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const el = document.createElement('div');
            el.className = `toast${isWarning ? ' warning' : ''}`;
            el.textContent = msg;
            document.body.appendChild(el);

            setTimeout(() => {
                el.classList.add('hidden');
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        // ─── START ──────────────────────────────────────────────────
        init();
    </script>
</body>
</html>
