<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iBld · Editor</title>
    <link rel="icon" href="assets/icons/ibld-logo.png" type="image/png" />
    <link rel="stylesheet" href="src/css/style.css" />
    <style>
        .editor-layout {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }
        .file-tree {
            width: 260px;
            min-width: 200px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .file-tree-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
            font-size: 13px;
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
        }
        .file-tree-header button {
            background: none;
            border: none;
            color: #00ccff;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 0 4px;
        }
        .file-tree-header button:hover {
            color: #fff;
        }
        .file-tree ul {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
        }
        .file-tree li {
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.1s;
        }
        .file-tree li:hover {
            background: #1a1a1a;
            color: #fff;
        }
        .file-tree li.active {
            background: #1a2a2a;
            color: #00ccff;
        }
        .file-tree li .file-actions {
            display: none;
            gap: 6px;
        }
        .file-tree li:hover .file-actions {
            display: flex;
        }
        .file-tree li .file-actions button {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            padding: 0 4px;
        }
        .file-tree li .file-actions button:hover {
            color: #ff4444;
        }
        .file-tree li .file-actions button.rename:hover {
            color: #ffcc00;
        }
        .file-tree .file-icon {
            margin-right: 8px;
        }
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }
        #editor-container {
            flex: 1;
            min-height: 400px;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            background: #1a1a1a;
        }
        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .editor-toolbar .left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .editor-toolbar .project-title {
            font-size: 18px;
            font-weight: 600;
        }
        .editor-toolbar .project-title .repo {
            color: #888;
            font-weight: 400;
            font-size: 14px;
        }
        .editor-toolbar .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: #111;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            color: #666;
            font-size: 13px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .status-bar .saved { color: #00ccff; }
        .status-bar .unsaved { color: #ffcc00; }
        .modal-small .modal-content { max-width: 400px; }
        .modal-small input {
            width: 100%;
            padding: 10px 14px;
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            margin: 8px 0 16px;
        }
        .modal-small input:focus { border-color: #00ccff; }
        .modal-small .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .file-tree-header .header-buttons {
            display: flex;
            gap: 4px;
        }
        #fileUploadInput { display: none; }
        @media (max-width: 800px) {
            .editor-layout { flex-direction: column; }
            .file-tree {
                width: 100%;
                min-width: unset;
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="assets/icons/ibld-logo.png" alt="iBld Logo" class="logo-icon" />
            <span class="logo-text">iBuild <span class="light">Web</span></span>
        </div>
        <div class="header-actions">
            <span id="userDisplay" class="user-badge"></span>
            <button id="backBtn" class="btn-secondary">← Dashboard</button>
            <button id="logoutBtn" class="btn-secondary">Logout</button>
        </div>
    </header>

    <div class="editor-container" style="display:flex;flex-direction:column;height:calc(100vh - 80px);padding:16px 24px;gap:12px;">
        <div class="editor-toolbar">
            <div class="left">
                <span class="project-title">
                    <span id="projectName">Project</span>
                    <span class="repo" id="repoName">repo</span>
                </span>
                <span id="saveStatus" class="saved">✅ Saved</span>
            </div>
            <div class="actions">
                <button id="saveBtn" class="btn-primary">💾 Save</button>
                <button id="buildBtn" class="btn-secondary">🔨 Build</button>
                <button id="downloadBtn" class="btn-secondary">📦 IPA</button>
            </div>
        </div>

        <div class="editor-layout">
            <div class="file-tree">
                <div class="file-tree-header">
                    <span>📁 Files</span>
                    <div class="header-buttons">
                        <button id="newFolderBtn" title="New Folder">📁+</button>
                        <button id="uploadBtn" title="Upload File">📤</button>
                        <button id="newFileBtn" title="New File">+</button>
                    </div>
                </div>
                <ul id="fileList"><li style="color:#555;text-align:center;padding:20px;">Loading...</li></ul>
                <input type="file" id="fileUploadInput" multiple />
            </div>

            <div class="editor-main">
                <div id="editor-container"></div>
                <div class="status-bar">
                    <span id="statusLeft">📄 <span id="currentFileName">main.swift</span></span>
                    <span id="statusRight">🐱 iBuild Web</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="newFileModal" class="modal modal-small" style="display:none;">
        <div class="modal-content">
            <h3>📄 New File</h3>
            <label for="newFileName">File path</label>
            <input type="text" id="newFileName" placeholder="Sources/NewFile.swift" />
            <div class="modal-actions">
                <button id="newFileCancel" class="btn-secondary">Cancel</button>
                <button id="newFileConfirm" class="btn-primary">Create</button>
            </div>
            <div id="newFileStatus" style="margin-top:10px;color:#888;font-size:13px;"></div>
        </div>
    </div>

    <div id="newFolderModal" class="modal modal-small" style="display:none;">
        <div class="modal-content">
            <h3>📁 New Folder</h3>
            <label for="newFolderName">Folder path</label>
            <input type="text" id="newFolderName" placeholder="Sources/NewFolder" />
            <div class="modal-actions">
                <button id="newFolderCancel" class="btn-secondary">Cancel</button>
                <button id="newFolderConfirm" class="btn-primary">Create</button>
            </div>
            <div id="newFolderStatus" style="margin-top:10px;color:#888;font-size:13px;"></div>
        </div>
    </div>

    <div id="renameModal" class="modal modal-small" style="display:none;">
        <div class="modal-content">
            <h3>✏️ Rename File</h3>
            <label for="renameFileName">New path</label>
            <input type="text" id="renameFileName" placeholder="Sources/NewName.swift" />
            <div class="modal-actions">
                <button id="renameCancel" class="btn-secondary">Cancel</button>
                <button id="renameConfirm" class="btn-primary">Rename</button>
            </div>
            <div id="renameStatus" style="margin-top:10px;color:#888;font-size:13px;"></div>
        </div>
    </div>

    <script src="src/js/monaco-loader.js"></script>
    <script src="src/js/build.js"></script>
    <script src="src/js/editor.js"></script>
</body>
</html>
