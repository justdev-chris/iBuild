<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iBuild Web</title>
    <link rel="icon" href="assets/icons/ibld-logo.PNG" type="image/png" />
    <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>

    <!-- ─── GLOBAL TOAST (defined FIRST) ────────────────────── -->
    <script>
        function showToast(msg, isWarning = false) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const el = document.createElement('div');
            el.className = `toast${isWarning ? ' warning' : ''}`;
            el.textContent = msg;
            document.body.appendChild(el);

            setTimeout(() => {
                el.classList.add('hidden');
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }
        window.showToast = showToast;
        console.log('✅ Toast global defined');
    </script>

    <!-- ─── HEADER ─────────────────────────────────────────────── -->
    <header>
        <div class="logo-area">
            <img src="assets/icons/ibld-logo.PNG" alt="iBuild Logo" class="logo-icon" />
            <span class="logo-text">iBuild <span class="light">Web</span></span>
        </div>
        <div class="header-actions">
            <span id="userDisplay" class="user-badge" style="display:none;"></span>
            <button id="loginBtn" class="btn-primary">Login with GitHub</button>
            <button id="logoutBtn" class="btn-secondary" style="display:none;">Logout</button>
        </div>
    </header>

    <!-- ─── MAIN ────────────────────────────────────────────────── -->
    <main>
        <section id="loginPrompt" class="login-prompt">
            <h2>Build iOS apps. No Mac required.</h2>
            <p>Sign in with GitHub to manage your iBuild projects.</p>
            <button id="loginBtnMain" class="btn-primary btn-large">Login with GitHub</button>
        </section>

        <section id="dashboard" style="display:none;">
            <div class="dashboard-header">
                <h2>Your Projects</h2>
                <button id="newProjectBtn" class="btn-primary">+ New Project</button>
            </div>
            <div id="projectList" class="project-list">
                <p class="loading-text">Loading projects...</p>
            </div>
        </section>
    </main>

    <!-- ─── NEW PROJECT MODAL ──────────────────────────────────── -->
    <div id="newProjectModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <h3>New Project</h3>
            <form id="newProjectForm">
                <label for="projectName">Project Name</label>
                <input type="text" id="projectName" placeholder="MyApp" required />
                <label for="projectDescription">Description (optional)</label>
                <input type="text" id="projectDescription" placeholder="A simple iOS app" />
                <button type="submit" class="btn-primary">Create Project</button>
            </form>
            <div id="modalStatus" class="modal-status"></div>
        </div>
    </div>

    <!-- ─── PAT LOGIN MODAL ──────────────────────────────────────── -->
    <div id="patModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="modal-close" id="patModalClose">&times;</span>
            <h3>🔑 Enter GitHub Token</h3>
            <p style="color:#888;font-size:14px;margin-bottom:12px;">
                Generate a token with <strong>repo</strong> and <strong>workflow</strong> scopes.
                <br />
                <a href="https://github.com/settings/tokens/new" target="_blank" style="color:#00ccff;">
                    → Generate token on GitHub
                </a>
            </p>
            <label for="patInput">Personal Access Token</label>
            <input type="password" id="patInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
            <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
                <button id="patCancel" class="btn-secondary">Cancel</button>
                <button id="patConfirm" class="btn-primary">Login</button>
            </div>
            <div id="patStatus" style="margin-top:12px;color:#888;font-size:13px;"></div>
        </div>
    </div>

    <!-- ─── FOOTER ────────────────────────────────────────────────── -->
    <footer>
        <p>🐱 iBuild Web &bull; Built by <a href="https://catsdevs.online" target="_blank">justdev-chris</a></p>
    </footer>

    <!-- ─── VCONSOLE ────────────────────────────────────────────── -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
        const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile/i.test(navigator.userAgent);
        const hasDebugParam = new URLSearchParams(window.location.search).has('debug');
        if (isMobile || hasDebugParam) {
            const vConsole = new VConsole();
            console.log('🐱 iBuild Web — vConsole enabled');
        }
    </script>

    <!-- ─── SCRIPTS ────────────────────────────────────────────── -->
    <script src="src/js/github.js"></script>
    <script src="src/js/projects.js"></script>
    <script src="src/js/app.js"></script>

</body>
</html>
